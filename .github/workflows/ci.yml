name: Frontend Checks

# Complements the starter-kit workflows (linter, tests) by adding the frontend
# gates they don't cover: strict ESLint, TypeScript typecheck, and Vitest.
# Assets are built first so generated Wayfinder files (@/routes, @/actions)
# resolve for ESLint import-order and tsc.

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (generates Wayfinder files)
        run: npm run build

      - name: ESLint
        run: npm run lint:check

      - name: Typecheck
        run: npm run types:check

      - name: Unit tests (Vitest)
        run: npm run test:unit
